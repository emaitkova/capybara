services:
  app:
    build: ./app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      SERVICE_FQDN_APP: /
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: "${DB_USER:-camieo}"
      DB_PASS: "${DB_PASS:-capyb4r4_sw4rm}"
      DB_NAME: "${DB_NAME:-camieo}"
      API_URL: "${API_URL:-}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.camieo-app-http.entrypoints=http
      - traefik.http.routers.camieo-app-http.rule=Host(`camieo.com`) || Host(`www.camieo.com`)
      - traefik.http.routers.camieo-app-http.priority=100
      - traefik.http.routers.camieo-app-http.service=camieo-app-svc
      - traefik.http.routers.camieo-app-https.entrypoints=https
      - traefik.http.routers.camieo-app-https.rule=Host(`camieo.com`) || Host(`www.camieo.com`)
      - traefik.http.routers.camieo-app-https.priority=100
      - traefik.http.routers.camieo-app-https.tls=true
      - traefik.http.routers.camieo-app-https.tls.certresolver=letsencrypt
      - traefik.http.routers.camieo-app-https.service=camieo-app-svc
      - traefik.http.services.camieo-app-svc.loadbalancer.server.port=3000
    networks:
      - internal
      - coolify

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASS:-r00t_c4py}"
      MYSQL_DATABASE:      "${DB_NAME:-camieo}"
      MYSQL_USER:          "${DB_USER:-camieo}"
      MYSQL_PASSWORD:      "${DB_PASS:-capyb4r4_sw4rm}"
    volumes:
      - camieo-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-r00t_c4py}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password
    labels:
      - traefik.enable=false
    networks:
      - internal

volumes:
  camieo-data:

networks:
  internal:
    driver: bridge
  coolify:
    external: true