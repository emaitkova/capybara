version: "3.8"

# ══════════════════════════════════════════
# CAMIEO.COM — Brainrot Game Platform
# Coolify-ready docker-compose
# ══════════════════════════════════════════

services:
  app:
    build: ./app
    container_name: camieo-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-camieo}
      - DB_PASS=${DB_PASS:-capyb4r4_sw4rm}
      - DB_NAME=${DB_NAME:-camieo}
      - API_URL=${API_URL:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - camieo-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  db:
    image: mysql:8.0
    container_name: camieo-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS:-r00t_c4py}
      - MYSQL_DATABASE=${DB_NAME:-camieo}
      - MYSQL_USER=${DB_USER:-camieo}
      - MYSQL_PASSWORD=${DB_PASS:-capyb4r4_sw4rm}
    volumes:
      - camieo-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    networks:
      - camieo-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-r00t_c4py}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

volumes:
  camieo-data:

networks:
  camieo-net:
    driver: bridge
